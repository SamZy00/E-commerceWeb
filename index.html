<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
</head>
<link rel="stylesheet" href="css/style.css">
<!-- <link rel="stylesheet" href="https//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> -->
<body>
    

    

<form action="login.html" id="loginForm"  method="POST">
    <div class="container-login">
        <div>
            <div class="login-cont">
                <img src="img/e-commerce-logo.png" alt="">
                <h4><strong>Shop With Samzy</strong></h4><p></p>
                
                <p>Email<span style="color: red;">*</span></p>
                <input type="email" id="email" placeholder="@example.com" required><p></p>

                <p>Password<span style="color:red;">*</span></p>

                <div class="password-box">
                    <input type="password" id="login-pass" placeholder="******" >
                    <span id="togglePassword">👁️</span>
                    <p id="passwordError"></p>
                </div>

                <button type="submit">Login</button><p></p>
                <span>Don't have an Account? <a href="index.html">Sign Up</a></span>

                <input type="checkbox"><span>Remember Me  <a href="forgot_password.html">Forgot Password?</a></span>

           <!-- <span><a href="forgot_password">Forgot Password?</a></span>  -->
            </div>
        </div>
    </div>
</form>

<script src="script/e-commerce.js"></script>
</body>
</html>
