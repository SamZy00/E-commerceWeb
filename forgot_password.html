<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
</head>
<link rel="stylesheet" href="css/style.css">
<body>
    


    <form action="" id="forgotForm">
        <div class="container-forgot">
             <div class="forgot_cont">
            <h4>Forgot Password</h4>
            <img src="img/e-commerce-logo.png" alt=""><p></p>
                 <p>Enter Your Registered Email<span style="color: red;">*</span></p>
                 <input type="email" id="email" placeholder="@example.com" required >

                 <div><button type="submit">Send Reset Link</button><button type="button" onclick="window.location.href='index.html'">Login</button></div>
                 <div></div>

            </div>
         </div>
    </form>

    <script>
        const indexBtn = document.getElementById("indexBtn");

        document.getElementById("forgotForm").addEventListener("click", function(e){
            e.preventDefault();
            if (this.checkValidity()){
                window.location.href = "reset_password.html";
            }
        } );

        
        
    </script>
</body>
</html>
