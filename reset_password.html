<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    

    <form action="" id="resetForm">
        <div class="container_reset">
            <div class="reset_cont">
                <h4>Reset Password</h4>
                <img src="e-commerce-logo.png" alt=""><p></p>
    
                <p>Password<span style="color:red;">*</span></p>
    
                <div class="password-box">
                    <input type="password" id="password" placeholder="******" required>
                    <span class="togglePassword">👁️</span>
                    <p class="passwordError"></p>
                </div>
    
                <p>Confirm Password<span style="color:red;">*</span></p>
    
                <div class="password-box">
                    <input type="password" id="confirmPassword" placeholder="******" required>
                    <span class="togglePassword">👁️</span>
                    <p class="passwordError"></p>
                </div>
    
                <div>
                    <button type="submit">Confirm</button>
                </div>
            </div>
        </div>
    </form>

    <script>

const resetPassword = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const resetEye = document.querySelectorAll(".togglePassword");
const resetForm = document.querySelector("form");

// Toggle both inputs safely
if (resetEye.length > 0) {
    resetEye.forEach((icon, index) => {
        icon.addEventListener("click", () => {
            const input = index === 0 ? resetPassword : confirmPassword;

            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "🙈";
            } else {
                input.type = "password";
                icon.textContent = "👁️";
            }
        });
    });
}

// Validation
if (resetForm) {
    resetForm.addEventListener("submit", (e) => {
        if (!resetPassword.value || !confirmPassword.value) {
            e.preventDefault();
            alert("All fields are required");
        }
        else if (resetPassword.value !== confirmPassword.value) {
            e.preventDefault();
            alert("Passwords do not match");
        }
    });
}

document.getElementById("resetForm").addEventListener("submit", function(e){
    e.preventDefault();
        if(this.checkValidity()){
            window.location.href = "index.html";
        }
    
    
});

    </script>
</body>
</html>
